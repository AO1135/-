<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>TabConvert Studio</title>
  <link rel="stylesheet" href="style.css">

  <!-- QRコード用ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>

  <!-- バーコード用ライブラリ -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <header>
    <h1>TabConvert Studio</h1>
    <p>PDF / 画像 / Word と QR・バーコードをまとめて扱うローカル変換ツール</p>
  </header>

  <!-- タブメニュー -->
  <nav class="tab-nav">
    <button class="tab-button active" data-tab="convert-tab">ファイル変換</button>
    <button class="tab-button" data-tab="qr-tab">QRコード作成</button>
    <button class="tab-button" data-tab="barcode-tab">バーコード作成</button>
  </nav>

  <!-- タブ内容：ファイル変換 -->
  <section id="convert-tab" class="tab-content active">
    <h2>ファイル変換</h2>
    <p class="note">
      ※ 現時点ではブラウザだけで実現しやすい変換のみ実装済みです。<br>
      画像(JPEG/PNG) ↔ 画像、画像 → PDF に対応。PDF/Wordの高度な変換は後から追加できます。
    </p>

    <div class="panel">
      <div class="form-row">
        <label class="file-label">
          入力ファイル（PDF / JPEG / PNG / DOCX）：
          <input type="file" id="convert-input-file" accept=".pdf,.png,.jpg,.jpeg,.docx,application/pdf,image/png,image/jpeg,application/vnd.openxmlformats-officedocument.wordprocessingml.document">
        </label>
      </div>

      <div class="form-row">
        <label for="input-type">入力形式（推定されますが手動選択も可）：</label>
        <select id="input-type">
          <option value="auto">自動判定</option>
          <option value="pdf">PDF (.pdf)</option>
          <option value="jpeg">JPEG (.jpg/.jpeg)</option>
          <option value="png">PNG (.png)</option>
          <option value="word">Word (.docx)</option>
        </select>
      </div>

      <div class="form-row">
        <label for="output-type">出力形式：</label>
        <select id="output-type">
          <option value="pdf">PDF (.pdf)</option>
          <option value="jpeg">JPEG (.jpg)</option>
          <option value="png">PNG (.png)</option>
          <option value="word">Word (.docx)</option>
        </select>
      </div>

      <div class="form-row">
        <label for="output-filename">出力ファイル名（拡張子なし）：</label>
        <input type="text" id="output-filename" placeholder="output_file">
      </div>

      <button id="convert-file-btn">変換を実行</button>
      <p id="convert-status" class="status-message"></p>
    </div>

    <div class="result-area">
      <h3>結果プレビュー</h3>
      <canvas id="convert-preview-canvas" class="preview-canvas"></canvas>
      <iframe id="convert-preview-frame" class="preview-frame"></iframe>
      <div class="download-area" id="convert-download-area"></div>
    </div>
  </section>

  <!-- タブ内容：QRコード作成 -->
  <section id="qr-tab" class="tab-content">
    <h2>QRコード作成</h2>
    <div class="panel">
      <div class="form-row">
        <label for="qr-text">QRコードにしたいテキスト / URL：</label>
        <textarea id="qr-text" rows="4" placeholder="https://example.com など"></textarea>
      </div>

      <div class="form-row">
        <label for="qr-filename">出力ファイル名（拡張子なし）：</label>
        <input type="text" id="qr-filename" placeholder="qrcode">
      </div>

      <button id="generate-qr-btn">QRコードを作成</button>
      <button id="copy-qr-btn" disabled>クリップボードにコピー（画像）</button>
    </div>

    <div class="result-area">
      <h3>結果プレビュー</h3>
      <canvas id="qr-canvas" class="preview-canvas"></canvas>
      <div class="download-area" id="qr-download-area"></div>
    </div>
  </section>

  <!-- タブ内容：バーコード作成 -->
  <section id="barcode-tab" class="tab-content">
    <h2>バーコード作成</h2>
    <div class="panel">
      <div class="form-row">
        <label for="barcode-text">バーコードにしたいテキスト / 数字：</label>
        <input type="text" id="barcode-text" placeholder="JANコードなど">
      </div>

      <div class="form-row">
        <label for="barcode-format">バーコード形式：</label>
        <select id="barcode-format">
          <option value="CODE128">CODE128</option>
          <option value="EAN13">EAN13</option>
          <option value="EAN8">EAN8</option>
        </select>
      </div>

      <div class="form-row">
        <label for="barcode-filename">出力ファイル名（拡張子なし）：</label>
        <input type="text" id="barcode-filename" placeholder="barcode">
      </div>

      <button id="generate-barcode-btn">バーコードを作成</button>
      <button id="copy-barcode-btn" disabled>クリップボードにコピー（画像）</button>
    </div>

    <div class="result-area">
      <h3>結果プレビュー</h3>
      <svg id="barcode-svg" class="preview-svg"></svg>
      <div class="download-area" id="barcode-download-area"></div>
    </div>
  </section>

  <footer>
    <p>すべての処理はブラウザ内で行われ、ファイルはサーバに送信されません。</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
